name: Daily leaderboard refresh

# Runs daily at noon UK time, and can be triggered by hand.
# Note: GitHub schedules use UTC and can drift a few minutes under load.
#  - 12:00 GMT  (winter) = 12:00 UTC
#  - 12:00 BST  (summer) = 11:00 UTC
# We run at 11:00 UTC so it lands at noon during British Summer Time, and
# 11:00 in winter — close enough for a daily gym board. Adjust if you prefer.
on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC daily (noon BST / 11am GMT)
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write          # allow the action to commit data.js / changes.js

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Run scraper
        run: node scripts/scrape.mjs

      - name: Commit changes if any
        run: |
          git config user.name  "Implexus Leaderboard Bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data.js changes.js)" ]; then
            git add data.js changes.js
            git commit -m "Leaderboard refresh ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed and pushed updated data."
          else
            echo "No changes today — nothing to commit."
          fi
